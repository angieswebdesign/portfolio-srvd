<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Angela Wallace // Visual Designer</title>

  <style>
    /* Baseline */
    html, body {
      height: 100%;
      margin: 0;
    }

    /* Fixed viewport frame */
    .frame {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;

      box-sizing: border-box;
      border: 20px solid #FA4D7E;
      background: transparent;

      pointer-events: none;
      z-index: 9999;
    }

    /* Optional demo content (remove if you want) */
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  line-height: 1.4;

  display: grid;
  place-items: center;
    }
    .content {
      padding: 32px;
      margin: 0;
      text-align: center;
    }

    img {
        height: 85px;
    }
  </style>
</head>

<body>
  <div class="frame" aria-hidden="true"></div>

  <!-- Optional demo content -->
  <main class="content">
    <h1><img src="images/AWD-sticky-logo.svg"></h1>
    <p>Updated portfolio coming soon.</p>
  </main>
</body>
</html>
